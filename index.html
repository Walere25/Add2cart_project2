<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADD TO CART</title>
</head>
<style>
    body{
        font-family: 'poppins', sans-serif;
        background: linear-gradient(135deg, #a66bff, #6dd5fa, #ffffff);
        margin: 0;
        padding: 0;
    }
    h1{
        text-align: center;
        color: white;
        padding: 20px;
        margin: 0;
        font-size: 40px;
        text-shadow: 0 3px 8px rgba(0,0,0,0.25);
    }
    /* PRODUCT GRID */
    .products{
        display: flex;
        /* grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); */
        gap: 25px;
        padding: 40px;
    }
    .product{
        background: white;
        border-radius: 18px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        transition: transform .2s;
    }
    .product:hover{
        transform: translateY(-15px);
    }
    .product img{
        width: 100%;
        border-radius: 15px;
    }
    .product h3{
        margin: 10px 0;
        font-size: 22px;
    }
    .price{
        font-size: 18px;
        color: #7a47ff;
        margin-bottom: 12px;
        font-weight: bold;
    }
    .product button{
        background: #7a47ff;
        color: white;
        border: none;
        padding: 10px 18px;
        font-size: 16px;
        border-radius: 12px;
        cursor: pointer;
    }
    .product button:hover{
        background: #5d32cc;
    }
    /* CART PANEL */
    .cart{
        background: white;
        padding: 25px;
        border-radius: 18px;
        margin: 30px auto;
        width: 90%;
        max-width: 600px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
    .cart h2{
        text-align: center;
        color: #7a47ff;
    }
    .cartitems{
        display: flex;
        justify-content: center;
        padding: 12px 0;
        border-bottom: 1px solid #eee;
    }
        .cart-item button{
        background: #ff4f66;
        border: none;
        color: white;
        padding: 6px 12px;
        font-size: 14px;
        border-radius: 10px;
        cursor: pointer;
    }
    .cart-item button:hover{
        background: #cc3a4d;
    }
    #total{
        font-size: 22px;
        text-align: center;
        padding: 15px 0;
        font-weight: bold;
        color: #7a47ff;
    }
    #buyBtn{
        width: 100%;
        padding: 14px;
        font-size: 18px;
        background: #10ca50;
        color: white;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: .3s;
       
    }
    #buyBtn:hover{
        background: #0ea542;
        transform: scaleX(1.1);
    }
    .nav{
        background-color: white;
        padding: 10px;
        

    }
    a{
        color: #7a47ff;
        text-decoration: none;
        padding: 15px 20px;
        transition: .4s;
        

    }
    a:hover{
        background-color: #7a47ff;
        color: white;
    }
    .first{
        background-color: #7a47ff;
        color: white;
    }


</style>
<body>
    <div class="nav">
        <a href="#" class="first">Home</a>
        <a href="#">Product</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

    <h1>Beautiful Online Store</h1>

    <!-- PRODUCT LIST -->
     <div class="products">
        <div class="product">
            <img src="https://th.bing.com/th/id/OIP.21ITPzsWIz3-zsucDGB_5gHaHa?w=192&h=192&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="Wireless headphone">
            <h3>Wireless Headphones</h3>
            <p class="price">$59</p>
            <button>Add to cart</button>
        </div>
        <div class="product">
            <img src="https://th.bing.com/th/id/OIP.SoLJjT1YugDUKSixc6qaAQHaHa?w=196&h=196&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="Smart Watch">
            <h3>Smart Watch</h3>
            <p class="price">$120</p>
            <button>Add to cart</button>
        </div>
        <div class="product">
            <img src="https://th.bing.com/th/id/OIF.A8JpOtpEsu2CmD85wYzeRQ?w=293&h=188&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3"  alt="Sneakers">
            <h3>Sneakers</h3>
            <p class="price">$75</p>
            <button>Add to cart</button>
        </div>
        <div class="product">
            <img src="https://th.bing.com/th/id/OIP.diScW0DtmjLmGicaIb88qAHaHa?w=188&h=188&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="Backpack">
            <h3>Backpack</h3>
            <p class="price">$40</p>
            <button>Add to cart</button>
        </div>
    </div>
    <!-- CART PANEL-->
     <div class="cart">
        <h2>Your cart</h2>
        <div id="cartItems"></div>
        <div id="total">Total: $0</div>
        <button id="buyBtn">Buy Now</button>
     </div>

    
</body>
</html>
